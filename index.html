<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blog!!</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ── CRUD UI styles (match existing theme) ─────────────────────────── */
        .toolbar {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .toolbar button {
            background: var(--header-bg);
            color: var(--text-color);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: var(--border-radius);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .toolbar button:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        /* action buttons on each post */
        .post-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-bottom: 0.5rem;
        }
        .post-actions button {
            background: transparent;
            border: 1px solid var(--tag-bg);
            color: var(--text-color);
            padding: 0.25rem 0.7rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .post-actions button:hover {
            background: var(--header-bg);
            border-color: var(--header-bg);
            color: var(--bg-color);
        }
        .post-actions button.delete-btn:hover {
            background: #c0392b;
            border-color: #c0392b;
        }

        /* ── Header auth buttons ──────────────────────────────────────────── */
        .header-right {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-left: auto;
        }
        .header-right .container {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .header-title {
            display: flex;
            align-items: baseline;
            gap: 1rem;
        }
        .header-actions {
            display: flex;
            gap: 0.5rem;
        }
        .header-actions button {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.35rem 1rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .header-actions button:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .header-actions button.sign-out-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .header-actions button.sign-out-btn:hover {
            background: rgba(192, 57, 43, 0.7);
            border-color: #c0392b;
        }
        #user-email {
            color: var(--text-color);
            font-size: 0.8rem;
            opacity: 0.85;
        }

        /* ── Modal / Form ─────────────────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 3rem 1rem;
            overflow-y: auto;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--post-bg);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
        /* Auth modal slightly smaller */
        .modal.auth-modal {
            max-width: 400px;
        }
        .modal h2 {
            color: var(--header-bg);
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            color: var(--header-bg);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--header-bg);
            outline: none;
        }
        .form-group .hint {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.3rem;
        }
        .form-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .form-buttons button {
            background: var(--header-bg);
            color: var(--text-color);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: var(--border-radius);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .form-buttons button.cancel-btn {
            background: #444;
        }
        .form-buttons button.cancel-btn:hover {
            background: #555;
        }
        .form-buttons button.save-btn:hover {
            opacity: 0.85;
        }

        /* notification toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--header-bg);
            color: var(--text-color);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 2000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .toast.error {
            background: #c0392b;
        }

        /* ── Auth hidden ──────────────────────────────────────────────────── */
        .auth-hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-title">
                <h1 id="main-header">damian's super cool blog !!</h1>
                <div class="header-actions" id="auth-actions">
                    <button id="btn-sign-in" onclick="window.showSignInModal()">Sign In</button>
                </div>
                <div class="header-actions" id="signed-in-actions" style="display:none;">
                    <span id="user-email"></span>
                    <button class="sign-out-btn" onclick="window.handleSignOut()">Sign Out</button>
                </div>
            </div>
            <p>summative 01 | new enterprise</p>
        </div>
    </header>

    <main class="container">
        <!-- Toolbar with Create button -->
        <div class="toolbar">
            <button id="new-post-btn" onclick="showCreateForm()">+ New Post</button>
        </div>

        <section class="blog-posts">
        </section>
    </main>

    <!-- Auth Modal (Sign In / Sign Up) -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal auth-modal">
            <h2 id="auth-modal-title">Sign In</h2>
            <form id="auth-form" onsubmit="window.handleAuthSubmit(event)">
                <div class="form-group">
                    <label for="auth-email">Email</label>
                    <input type="email" id="auth-email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <input type="password" id="auth-password" required minlength="6" placeholder="At least 6 characters">
                </div>
                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="window.closeAuthModal()">Cancel</button>
                    <button type="submit" class="save-btn" id="auth-submit-btn">Sign In</button>
                </div>
                <p style="margin-top:1rem;text-align:center;font-size:0.8rem;color:#888;">
                    <a href="#" id="auth-toggle-link" onclick="window.toggleAuthMode()" style="color:var(--header-bg);">Don't have an account? Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modal-title">New Post</h2>
            <form id="post-form" onsubmit="handleFormSubmit(event)">
                <!-- Hidden: editing sprint id -->
                <input type="hidden" id="edit-id" value="">

                <div class="form-group">
                    <label for="form-title">Title</label>
                    <input type="text" id="form-title" required placeholder="e.g. Week 05">
                </div>

                <div class="form-group">
                    <label for="form-date">Date (DD-MM-YYYY)</label>
                    <input type="text" id="form-date" required placeholder="e.g. 05-06-2026"
                           pattern="\d{2}-\d{2}-\d{4}" title="Use format DD-MM-YYYY">
                </div>

                <div class="form-group">
                    <label for="form-went">What went well :D</label>
                    <textarea id="form-went" required placeholder="What went well this week?"></textarea>
                </div>

                <div class="form-group">
                    <label for="form-not">What didn't go well D:</label>
                    <textarea id="form-not" required placeholder="What didn't go well?"></textarea>
                </div>

                <div class="form-group">
                    <label for="form-improve">What can be improved :exhale:</label>
                    <textarea id="form-improve" required placeholder="What could be improved?"></textarea>
                </div>

                <div class="form-group">
                    <label for="form-next">Next Actions</label>
                    <textarea id="form-next" required placeholder="What's next?"></textarea>
                </div>

                <div class="form-group">
                    <label for="form-tags">Tags</label>
                    <input type="text" id="form-tags" required
                           placeholder="Research, Development, Testing"
                           pattern="^[A-Za-z0-9\s,]+$" title="Comma-separated words only">
                    <p class="hint">Comma-separated, no special characters.</p>
                </div>

                <div class="form-buttons">
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save-btn" id="save-btn">Save Post</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
      window.__supabase = { createClient };
    </script>
    <script src="js/scripts.js" type="module"></script>
</body>
</html>
